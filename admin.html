<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Instituto Nadar</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body { display: flex; min-height: 100vh; overflow: hidden; }
        
        /* Dashboard Layout */
        .sidebar {
            width: 250px;
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }

        .main-content {
            flex: 1;
            padding: 80px 2rem 2rem;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #001f3f, var(--bg-dark));
        }

        .sidebar-btn {
            padding: 1rem;
            border-radius: 10px;
            color: var(--text-main);
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            border: none;
            width: 100%;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: var(--font-family);
        }

        .sidebar-btn:hover, .sidebar-btn.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
        }

        .submenu {
            padding-left: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: -0.5rem;
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin: 1rem 0 0.5rem 1rem;
        }

        /* Alunos List */
        .alunos-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .aluno-item {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .aluno-item:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        /* Modal / Push */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111827;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-aguardando { background: #facc15; color: #000; }
        .status-documentacao { background: #ef4444; color: #fff; }
        .status-matriculado { background: #22c55e; color: #fff; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.8rem; color: var(--text-muted); }
        .input-group input, .input-group select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.8rem;
            border-radius: 8px;
            color: #fff;
        }

        .btn-action {
            margin-top: 2rem;
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-approve { background: var(--accent); color: var(--bg-dark); }
        .btn-approve:hover { background: #fff; transform: scale(1.02); }

        header { padding: 0.5rem 2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Admin Nadar</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Sair</a></li>
            </ul>
        </nav>
    </header>

    <div class="sidebar">
        <div class="section-title">Cadastros</div>
        
        <!-- Turmas -->
        <div>
            <button class="sidebar-btn" onclick="toggleSubmenu('subTurma')"><span>🏢</span> Turmas</button>
            <div id="subTurma" class="submenu" style="display:none">
                <button class="sidebar-btn" onclick="showSection('turmas'); renderList('turmas')">Listar</button>
                <button class="sidebar-btn" onclick="openModal('modalTurma')">Cadastrar</button>
            </div>
        </div>

        <!-- Professores -->
        <div>
            <button class="sidebar-btn" onclick="toggleSubmenu('subProf')"><span>👨‍🏫</span> Professores</button>
            <div id="subProf" class="submenu" style="display:none">
                <button class="sidebar-btn" onclick="showSection('professores'); renderList('professores')">Listar</button>
                <button class="sidebar-btn" onclick="openModal('modalProfessor')">Cadastrar</button>
            </div>
        </div>

        <!-- Usuários -->
        <div>
            <button class="sidebar-btn" onclick="toggleSubmenu('subUser')"><span>👤</span> Usuários</button>
            <div id="subUser" class="submenu" style="display:none">
                <button class="sidebar-btn" onclick="showSection('usuarios'); renderList('usuarios')">Listar</button>
                <button class="sidebar-btn" onclick="openModal('modalUsuario')">Cadastrar</button>
            </div>
        </div>

        <div class="section-title">Gerenciamento</div>
        <button class="sidebar-btn" id="btnAlunos" onclick="showSection('alunos')"><span>👥</span> Alunos</button>
    </div>

    <div class="main-content">
        <!-- SEÇÃO ALUNOS -->
        <div id="sectionAlunos" class="admin-section">
            <h1 style="margin-bottom: 2rem;">Alunos Registrados</h1>
            <div class="alunos-list" id="listaAlunos">
                <!-- Mantendo mock por enquanto, mas pode ser dinâmico também -->
            </div>
        </div>

        <!-- SEÇÃO TURMAS -->
        <div id="sectionTurmas" class="admin-section" style="display:none">
            <h1 style="margin-bottom: 2rem;">Turmas Cadastradas</h1>
            <div class="alunos-list" id="listaTurmas"></div>
        </div>

        <!-- SEÇÃO PROFESSORES -->
        <div id="sectionProfessores" class="admin-section" style="display:none">
            <h1 style="margin-bottom: 2rem;">Professores</h1>
            <div class="alunos-list" id="listaProfessores"></div>
        </div>

        <!-- SEÇÃO USUÁRIOS -->
        <div id="sectionUsuarios" class="admin-section" style="display:none">
            <h1 style="margin-bottom: 2rem;">Usuários do Sistema</h1>
            <div class="alunos-list" id="listaUsuarios"></div>
        </div>
    </div>

    <!-- MODAL TURMA -->
    <div id="modalTurma" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('modalTurma')">&times;</span>
            <h2 id="titleTurma">Cadastrar Nova Turma</h2>
            <input type="hidden" id="editIndexTurma">
            <div class="form-grid">
                <div class="input-group">
                    <label>Nome da Turma</label>
                    <input type="text" id="turmaNome" placeholder="Ex: Hidroginástica">
                </div>
                <div class="input-group">
                    <label>Limite de Vagas</label>
                    <input type="number" id="turmaVagas" placeholder="Ex: 50">
                </div>
                <div class="input-group">
                    <label>Horário</label>
                    <input type="time" id="turmaHorario">
                </div>
                <div class="input-group">
                    <label>Professor Responsável</label>
                    <select id="turmaProf">
                        <option value="">Selecione</option>
                        <option>Prof. Ricardo</option>
                        <option>Prof. Ana</option>
                    </select>
                </div>
            </div>
            <button class="btn-action btn-approve" onclick="saveData('turmas')">SALVAR TURMA</button>
        </div>
    </div>

    <!-- MODAL PROFESSOR -->
    <div id="modalProfessor" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('modalProfessor')">&times;</span>
            <h2 id="titleProf">Cadastrar Professor</h2>
            <input type="hidden" id="editIndexProf">
            <div class="form-grid">
                <div class="input-group col-12">
                    <label>Nome Completo</label>
                    <input type="text" id="profNome">
                </div>
                <div class="input-group">
                    <label>Usuário de Acesso</label>
                    <input type="text" id="profUser">
                </div>
                <div class="input-group">
                    <label>Senha Provisória</label>
                    <input type="password" id="profPass">
                </div>
            </div>
            <button class="btn-action btn-approve" onclick="saveData('professores')">SALVAR PROFESSOR</button>
        </div>
    </div>

    <!-- MODAL VISUALIZAÇÃO ALUNO -->
    <div id="modalAluno" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('modalAluno')">&times;</span>
            <h2 id="alunoNome">Detalhes do Aluno</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Validação de Matrícula</p>
            <div class="form-grid">
                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" value="123.456.789-00" readonly>
                </div>
                <div class="input-group">
                    <label>Data Nascimento</label>
                    <input type="text" value="01/01/2010" readonly>
                </div>
                <div class="input-group">
                    <label>RG/CNH Aluno</label>
                    <a href="#" style="color: var(--accent); font-size: 0.8rem;">Ver Arquivo</a>
                </div>
                <div class="input-group">
                    <label>Comprovante Residência</label>
                    <a href="#" style="color: var(--accent); font-size: 0.8rem;">Ver Arquivo</a>
                </div>
            </div>
            <div class="input-group" style="margin-top: 1rem;">
                <label>Vincular a Turma</label>
                <select>
                    <option>Selecione uma Turma</option>
                    <option>Hidroginástica - 18:00 (45 vagas)</option>
                    <option>Natação Infantil - 14:00 (12 vagas)</option>
                </select>
            </div>
            <button class="btn-action btn-approve" onclick="approveAluno()">APROVAR E MATRICULAR</button>
        </div>
    </div>

    <script>
        // --- DATA MANAGEMENT (CRUD) ---
        const storageKey = (type) => `nadar_${type}`;

        function saveData(type) {
            const data = JSON.parse(localStorage.getItem(storageKey(type)) || '[]');
            let item = {};
            let editIndex = -1;

            if (type === 'turmas') {
                item = {
                    nome: document.getElementById('turmaNome').value,
                    vagas: document.getElementById('turmaVagas').value,
                    horario: document.getElementById('turmaHorario').value,
                    prof: document.getElementById('turmaProf').value
                };
                editIndex = document.getElementById('editIndexTurma').value;
            } else if (type === 'professores') {
                item = {
                    nome: document.getElementById('profNome').value,
                    user: document.getElementById('profUser').value,
                    pass: document.getElementById('profPass').value
                };
                editIndex = document.getElementById('editIndexProf').value;
            }

            if (editIndex > -1) {
                data[editIndex] = item;
            } else {
                data.push(item);
            }

            localStorage.setItem(storageKey(type), JSON.stringify(data));
            alert('Salvo com sucesso!');
            closeModal(type === 'turmas' ? 'modalTurma' : 'modalProfessor');
            renderList(type);
            
            // Limpa campos
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.querySelectorAll('select').forEach(s => s.value = '');
            document.getElementById('editIndexTurma').value = -1;
            document.getElementById('editIndexProf').value = -1;
        }

        function renderList(type) {
            const listId = 'lista' + type.charAt(0).toUpperCase() + type.slice(1);
            const container = document.getElementById(listId);
            const data = JSON.parse(localStorage.getItem(storageKey(type)) || '[]');
            
            if (data.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nenhum registro encontrado.</p>';
                return;
            }

            container.innerHTML = data.map((item, index) => `
                <div class="aluno-item">
                    <div>
                        <strong>${item.nome}</strong> 
                        ${item.horario ? ` - ${item.horario} (${item.vagas} vagas)` : ''}
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="editItem('${type}', ${index})" style="background:none; border:none; color:var(--accent); cursor:pointer;">Editar</button>
                        <button onclick="deleteItem('${type}', ${index})" style="background:none; border:none; color:#ef4444; cursor:pointer;">Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteItem(type, index) {
            if (confirm('Tem certeza que deseja excluir?')) {
                const data = JSON.parse(localStorage.getItem(storageKey(type)) || '[]');
                data.splice(index, 1);
                localStorage.setItem(storageKey(type), JSON.stringify(data));
                renderList(type);
            }
        }

        function editItem(type, index) {
            const data = JSON.parse(localStorage.getItem(storageKey(type)) || '[]');
            const item = data[index];

            if (type === 'turmas') {
                document.getElementById('turmaNome').value = item.nome;
                document.getElementById('turmaVagas').value = item.vagas;
                document.getElementById('turmaHorario').value = item.horario;
                document.getElementById('turmaProf').value = item.prof;
                document.getElementById('editIndexTurma').value = index;
                document.getElementById('titleTurma').innerText = 'Editar Turma';
                openModal('modalTurma');
            } else if (type === 'professores') {
                document.getElementById('profNome').value = item.nome;
                document.getElementById('profUser').value = item.user;
                document.getElementById('profPass').value = item.pass;
                document.getElementById('editIndexProf').value = index;
                document.getElementById('titleProf').innerText = 'Editar Professor';
                openModal('modalProfessor');
            }
        }

        // --- UI FUNCTIONS ---
        function toggleSubmenu(id) {
            const sub = document.getElementById(id);
            sub.style.display = sub.style.display === 'none' ? 'flex' : 'none';
        }

        function showSection(sectionId) {
            document.querySelectorAll('.admin-section').forEach(sec => sec.style.display = 'none');
            const target = 'section' + sectionId.charAt(0).toUpperCase() + sectionId.slice(1);
            document.getElementById(target).style.display = 'block';
            document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('active'));
            if (sectionId === 'alunos') document.getElementById('btnAlunos').classList.add('active');
        }

        function openModal(id) { 
            // Reset titles if opening for new registration
            if (id === 'modalTurma' && document.getElementById('editIndexTurma').value == -1) document.getElementById('titleTurma').innerText = 'Cadastrar Nova Turma';
            if (id === 'modalProfessor' && document.getElementById('editIndexProf').value == -1) document.getElementById('titleProf').innerText = 'Cadastrar Professor';
            document.getElementById(id).style.display = 'flex'; 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function viewAluno(nome) {
            document.getElementById('alunoNome').innerText = nome;
            openModal('modalAluno');
        }

        function approveAluno() {
            alert('Aluno matriculado com sucesso! Notificação enviada.');
            closeModal('modalAluno');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
